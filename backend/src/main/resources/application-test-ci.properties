# Perfil dedicado a CI: evita dependencias externas (PostgreSQL / secretos locales)
# y permite levantar el ApplicationContext de forma determinista.

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Valores mockeados para infraestructura de seguridad en CI.
APP_JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
APP_JWT_ISSUER=cursosonline-backend-ci
APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=15
APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS=30
APP_JWT_CLOCK_SKEW_SECONDS=60
APP_CORS_ALLOWED_ORIGINS=http://localhost:5173

# Mantener ruta de uploads compatible con tests/arranque de contexto.
spring.servlet.multipart.location=../uploads
