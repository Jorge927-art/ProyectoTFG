spring.application.name=backend

# Perfil activo por defecto para entorno local.
spring.profiles.default=dev

# Importa variables desde un archivo local opcional (formato .properties).
spring.config.import=optional:file:.env.properties

# Configuración de base de datos delegada por perfil (dev/prod).

# Estrategia de creación de tablas (usa 'update' para no borrar datos o 'create' para limpiar)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Mostrar el SQL generado por Hibernate en la consola
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Formatear el SQL para una mejor legibilidad 
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

# Desactivar open-in-view para evitar consultas durante el renderizado de vistas.
spring.jpa.open-in-view=false

# Configuración de logging para mostrar los parámetros de las consultas SQL
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND:trace}

# Evita que Hibernate convierta CamelCase a snake_case automáticamente
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Propiedades base para la infraestructura JWT. Pueden sobreescribirse con variables de entorno.
app.jwt.secret=${APP_JWT_SECRET:change-me-in-local-and-tests-please}
app.jwt.issuer=${APP_JWT_ISSUER:cursosonline-backend}
app.jwt.access-token-expiration-minutes=${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
app.jwt.refresh-token-expiration-days=${APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
app.jwt.clock-skew-seconds=${APP_JWT_CLOCK_SKEW_SECONDS:60}

# Configuración de almacenamiento de archivos para fotos y documentos
# Configuración de almacenamiento de archivos para fotos y documentos
spring.servlet.multipart.location=../uploads


# Opcional pero recomendado: Límites de tamaño para el archivo y la petición
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# Fuerza el log detallado de la seguridad y el procesamiento de peticiones
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Muestra los errores de serialización de Jackson en consola
logging.level.org.springframework.http.converter.json=TRACE


