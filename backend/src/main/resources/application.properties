spring.application.name=backend

# Perfil activo por defecto para entorno local.
spring.profiles.default=dev

# Importa variables desde un archivo local opcional (formato .properties).
spring.config.import=optional:file:.env.properties

# Configuración de base de datos delegada por perfil (dev/prod).

# Estrategia de creación de tablas (usa 'update' para no borrar datos o 'create' para limpiar)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Mostrar el SQL generado por Hibernate en la consola
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Formatear el SQL para una mejor legibilidad 
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

# Configurar el dialecto de Hibernate para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuración de logging para mostrar los parámetros de las consultas SQL
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND:trace}

# Evita que Hibernate convierta CamelCase a snake_case automáticamente
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

